<div class="page-header">
    <div class="page-title">
        <h1>Administrar Áreas</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="#" data-page="home.html"><i class="fas fa-home"></i> Inicio</a></li>
                <li class="breadcrumb-item active">Curriculo / Áreas</li>
            </ol>
        </nav>
    </div>
</div>

<div class="content-wrapper">
    <div class="card table-card">
        <div class="card-header-actions">
            <button class="btn-primary-dashboard" id="btnAgregarArea">
                <i class="fas fa-plus-circle"></i> Agregar área
            </button>
        </div>

        <div class="table-responsive">
            <table id="areasTable" class="display nowrap" style="width:100%">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre del Área</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Agregar Área -->
<div id="modalAgregarArea" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-layer-group"></i> Agregar área</h2>
            <span class="close-modal">&times;</span>
        </div>
        <form id="formAgregarArea">
            <div class="modal-body">
                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-hashtag"></i></span>
                    <input type="number" placeholder="Ingresar código" name="nuevoCodArea" required>
                </div>
                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-font"></i></span>
                    <input type="text" placeholder="Ingresar nombre del área" name="nuevoNomArea" required>
                </div>
                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-toggle-on"></i></span>
                    <select name="nuevoEstadoArea" required>
                        <option value="Activado">Activado</option>
                        <option value="Desactivado">Desactivado</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary close-modal-btn">Salir</button>
                <button type="submit" class="btn btn-primary">Guardar área</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Editar Área -->
<div id="modalEditarArea" class="modal">
    <div class="modal-content">
        <div class="modal-header edit">
            <h2><i class="fas fa-edit"></i> Editar área</h2>
            <span class="close-modal">&times;</span>
        </div>
        <form id="formEditarArea">
            <div class="modal-body">
                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-hashtag"></i></span>
                    <input type="number" id="editarCodArea" name="editarCodArea" readonly>
                </div>
                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-font"></i></span>
                    <input type="text" id="editarNomArea" name="editarNomArea" required>
                </div>
                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-toggle-on"></i></span>
                    <select id="editarEstadoArea" name="editarEstadoArea" required>
                        <option value="Activado">Activado</option>
                        <option value="Desactivado">Desactivado</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary close-modal-btn">Salir</button>
                <button type="submit" class="btn btn-primary">Modificar área</button>
            </div>
        </form>
    </div>
</div>

<script src="js/areas.js"></script>
